<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白话读书 — AI转译助手</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F6F4F0;
  --bg-card: #FFFFFF;
  --bg-orig: #FAF9F7;
  --bg-trans: #F0F7F4;
  --text-primary: #1A1A1A;
  --text-secondary: #5C5C5C;
  --text-hint: #9A9A9A;
  --accent: #2D7A5F;
  --accent-light: #E8F5EE;
  --accent-hover: #236B50;
  --border: #E8E6E2;
  --border-light: #F0EEEA;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-lg: 20px;
  --font-serif: 'Noto Serif SC', 'Songti SC', serif;
  --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.8;
}

/* Header */
.header {
  padding: 24px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  font-weight: 700;
  font-family: var(--font-serif);
}

.logo-text {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
}

.logo-sub {
  font-size: 12px;
  color: var(--text-hint);
  font-weight: 400;
  margin-left: 12px;
}

.api-config {
  display: flex;
  align-items: center;
  gap: 8px;
}

.api-config input {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  width: 280px;
  font-family: var(--font-sans);
  background: var(--bg);
  transition: border-color 0.2s;
}

.api-config input:focus {
  outline: none;
  border-color: var(--accent);
}

.api-config input::placeholder {
  color: var(--text-hint);
}

/* Upload Area */
.upload-area {
  max-width: 680px;
  margin: 60px auto;
  text-align: center;
  padding: 0 20px;
}

.upload-title {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.upload-desc {
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 36px;
  line-height: 1.8;
}

.upload-box {
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 60px 40px;
  cursor: pointer;
  transition: all 0.3s ease;
  background: var(--bg-card);
}

.upload-box:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}

.upload-box.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: scale(1.01);
}

.upload-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.6;
}

.upload-label {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.upload-hint {
  font-size: 13px;
  color: var(--text-hint);
}

.upload-box input[type="file"] {
  display: none;
}

/* Main Reader */
.reader-container {
  display: none;
  position: fixed;
  top: 73px;
  left: 60px;
  right: 145px;
  bottom: 0;
  flex-direction: column;
  padding: 12px 0 8px;
}

.reader-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  padding: 0 4px;
  flex-shrink: 0;
}

.book-title {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
}

.reader-controls {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-primary);
  font-weight: 500;
}

.btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.btn-primary:hover {
  background: var(--accent-hover);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Paragraphs */
#paragraphList {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.paragraph-block {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow 0.3s;
  border: 1px solid var(--border-light);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.paragraph-block:hover {
  box-shadow: var(--shadow-md);
}

.paragraph-block.translating {
  border-color: var(--accent);
}

.para-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.para-original {
  padding: 20px 24px;
  background: var(--bg-orig);
  border-right: 1px solid var(--border-light);
  font-family: var(--font-serif);
  font-size: 15px;
  line-height: 2;
  color: var(--text-primary);
  overflow-y: auto;
}

.para-translated {
  padding: 20px 24px;
  background: var(--bg-trans);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 2;
  color: var(--text-primary);
  position: relative;
  overflow-y: auto;
}

.para-label {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 12px;
}

.label-orig {
  background: #F0EEEA;
  color: var(--text-hint);
}

.label-trans {
  background: #D4EDDF;
  color: var(--accent);
}

/* Loading animation */
.loading-dots {
  display: inline-flex;
  gap: 4px;
  align-items: center;
  padding: 8px 0;
}

.loading-dots span {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: dot-bounce 1.2s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes dot-bounce {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

/* Streaming text cursor */
.streaming::after {
  content: '▎';
  color: var(--accent);
  animation: blink 0.8s infinite;
  font-weight: 300;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Page nav */
.page-nav {
  display: none;
}

.side-nav-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 64px;
  background: rgba(255,255,255,0.9);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-md);
  cursor: pointer;
  font-size: 20px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  z-index: 200;
  backdrop-filter: blur(8px);
}

.side-nav-btn:hover {
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: var(--shadow-lg);
}

.side-nav-btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
  pointer-events: none;
}

.side-nav-left { left: 12px; }
.side-nav-right { right: 12px; }

.translate-btns {
  position: fixed;
  right: 12px;
  bottom: calc(50% + 52px);
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 200;
}

.translate-btns .btn {
  width: 120px;
  text-align: center;
  box-shadow: var(--shadow-md);
}

.page-info {
  font-size: 14px;
  color: var(--text-secondary);
  min-width: 120px;
  text-align: center;
}

/* Progress */
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1A1A1A;
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 1000;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
  .api-config input { width: 200px; }
  .upload-area { margin: 30px auto; }
  .upload-title { font-size: 24px; }
  .para-columns { grid-template-columns: 1fr; }
  .para-original { border-right: none; border-bottom: 1px solid var(--border-light); }
  .reader-container { padding: 20px 12px 40px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">白</div>
    <span class="logo-text">白话读书</span>
    <span class="logo-sub">AI转译助手</span>
  </div>
  <div class="api-config">
    <input type="password" id="apiKey" placeholder="输入你的 DeepSeek API Key" />
  </div>
</div>

<!-- Upload -->
<div class="upload-area" id="uploadArea">
  <h1 class="upload-title">把天书变成大白话</h1>
  <p class="upload-desc">
    上传你正在读的PDF，AI会把晦涩的学术语言转译成<br>
    你一看就懂的日常表达，同时保留原文对照学习
  </p>
  <div class="upload-box" id="uploadBox">
    <div class="upload-icon">📄</div>
    <div class="upload-label">点击上传 PDF 或拖拽到这里</div>
    <div class="upload-hint">支持中文/英文 PDF，建议单次上传一本书</div>
    <input type="file" id="fileInput" accept=".pdf" />
  </div>
</div>

<!-- Reader -->
<div class="reader-container" id="readerContainer">
  <div class="reader-header">
    <div class="book-title" id="bookTitle">加载中...</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="paragraphList"></div>
  <div class="page-nav">
    <span class="page-info" id="pageInfo">第 1 页 / 共 1 页</span>
  </div>
</div>

<button class="side-nav-btn side-nav-left" id="prevBtn" onclick="changePage(-1)">‹</button>
<button class="side-nav-btn side-nav-right" id="nextBtn" onclick="changePage(1)">›</button>

<div class="translate-btns" id="translateBtns">
  <button class="btn" onclick="translatePage()">转译当前页</button>
  <button class="btn btn-primary" id="translateAllBtn" onclick="translateAll()">一键全部转译</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== State =====
let pdfDoc = null;
let allPages = []; // [{pageNum, imageData, translated}]
let currentPage = 0;
let isTranslating = false;

// ===== PDF.js Setup =====
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ===== Upload Handling =====
const uploadBox = document.getElementById('uploadBox');
const fileInput = document.getElementById('fileInput');

uploadBox.addEventListener('click', () => fileInput.click());
uploadBox.addEventListener('dragover', (e) => { e.preventDefault(); uploadBox.classList.add('dragover'); });
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('dragover'));
uploadBox.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadBox.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') loadPDF(file);
  else showToast('请上传 PDF 文件');
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});

// ===== Load PDF =====
async function loadPDF(file) {
  showToast('正在解析 PDF...');
  const arrayBuffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  const totalPages = pdfDoc.numPages;
  document.getElementById('bookTitle').textContent = file.name.replace('.pdf', '');

  allPages = [];
  for (let i = 1; i <= totalPages; i++) {
    allPages.push({ pageNum: i, imageData: null, translated: '' });
  }

  document.getElementById('uploadArea').style.display = 'none';
  document.getElementById('readerContainer').style.display = 'flex';
  document.getElementById('translateBtns').style.display = 'flex';
  currentPage = 0;
  renderPage();
  showToast(`解析完成，共 ${totalPages} 页`);
}

// ===== Render =====
async function renderPageImage(pageIdx) {
  const p = allPages[pageIdx];
  if (p.imageData) return;
  const pdfPage = await pdfDoc.getPage(p.pageNum);
  const viewport = pdfPage.getViewport({ scale: 1.0 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await pdfPage.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  p.imageData = canvas.toDataURL('image/jpeg', 0.7);
}

async function renderPage() {
  const page = allPages[currentPage];
  if (!page) return;

  const list = document.getElementById('paragraphList');
  list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-hint);">渲染中...</div>';

  document.getElementById('pageInfo').textContent = `第 ${currentPage + 1} 页 / 共 ${allPages.length} 页`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === allPages.length - 1;

  await renderPageImage(currentPage);

  // Pre-render next page in background
  if (currentPage + 1 < allPages.length) renderPageImage(currentPage + 1);

  list.innerHTML = '';
  const block = document.createElement('div');
  block.className = 'paragraph-block';
  block.id = 'para-0';
  block.innerHTML = `
    <div class="para-columns">
      <div class="para-original">
        <div class="para-label label-orig">原文</div>
        <img src="${page.imageData}" style="max-width:100%;border-radius:4px;" />
      </div>
      <div class="para-translated" id="trans-0">
        <div class="para-label label-trans">大白话</div>
        <div id="trans-content-0">
          ${page.translated
            ? escapeHtml(page.translated)
            : '<span style="color:var(--text-hint);font-size:13px;">点击上方"转译当前页"开始</span>'}
        </div>
      </div>
    </div>
  `;
  list.appendChild(block);
  updateProgress();
}

function changePage(delta) {
  const newPage = currentPage + delta;
  if (newPage >= 0 && newPage < allPages.length) {
    currentPage = newPage;
    renderPage();
  }
}

function updateProgress() {
  const done = allPages.filter(p => p.translated).length;
  const pct = allPages.length > 0 ? (done / allPages.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ===== Translation =====
async function translatePageImage(pageIdx) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('请先输入 DeepSeek API Key'); return false; }

  const page = allPages[pageIdx];
  if (page.translated) return true;

  const block = document.getElementById('para-0');
  const contentEl = document.getElementById('trans-content-0');
  if (block) block.classList.add('translating');

  try {
    // Step 1: OCR
    if (contentEl) contentEl.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><span style="font-size:12px;color:var(--text-hint);margin-left:8px;">OCR 识别中...</span>';
    const { data: { text } } = await Tesseract.recognize(page.imageData, 'chi_sim+eng');

    if (!text.trim()) {
      page.translated = '此页无可识别的文字内容';
      if (contentEl) contentEl.textContent = page.translated;
      if (block) block.classList.remove('translating');
      updateProgress();
      return true;
    }

    // Step 2: Translate with DeepSeek text model
    if (contentEl) contentEl.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><span style="font-size:12px;color:var(--text-hint);margin-left:8px;">转译中...</span>';

    const systemPrompt = `你是一位能把复杂学术内容讲给普通人听的高手。你的任务是把用户给你的段落"转译"成大白话。

规则：
1. 用日常口语重新表达，像给一个聪明但没学过这个领域的朋友解释
2. 遇到专业术语，先用大白话解释概念，再用【】标注原术语
3. 可以用生活中的例子和类比来帮助理解
4. 保留原文的核心意思，不要遗漏重要信息
5. 如果原文有逻辑推导，把推导过程也讲清楚
6. 语气自然亲切，不要像机器翻译
7. 不要加"简单来说"、"换句话说"这类口水话开头，直接讲`;

    if (/[^\x00-\xFF]/.test(apiKey)) {
      showToast('API Key 含有非法字符，请重新粘贴');
      if (block) block.classList.remove('translating');
      if (contentEl) contentEl.innerHTML = '<span style="color:#D85A30;font-size:13px;">API Key 含有非法字符，请重新粘贴</span>';
      return false;
    }

    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: text }
        ],
        stream: true
      })
    });

    if (!response.ok) {
      const errBody = await response.text();
      throw new Error(`API 错误: ${response.status} — ${errBody}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let result = '';

    if (contentEl) contentEl.innerHTML = '';
    if (contentEl) contentEl.classList.add('streaming');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
      for (const line of lines) {
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || '';
          result += delta;
          if (contentEl) contentEl.textContent = result;
        } catch (e) { /* skip parse errors */ }
      }
    }

    if (contentEl) contentEl.classList.remove('streaming');
    page.translated = result;
    if (block) block.classList.remove('translating');
    updateProgress();
    return true;

  } catch (err) {
    if (contentEl) {
      contentEl.classList.remove('streaming');
      contentEl.innerHTML = `<span style="color:#D85A30;font-size:13px;">转译失败: ${escapeHtml(err.message)}</span>`;
    }
    if (block) block.classList.remove('translating');
    return false;
  }
}

async function translatePage() {
  if (isTranslating) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('请先输入 DeepSeek API Key'); return; }
  isTranslating = true;
  await translatePageImage(currentPage);
  isTranslating = false;
  showToast('当前页转译完成');
}

async function translateAll() {
  if (isTranslating) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('请先输入 DeepSeek API Key'); return; }

  isTranslating = true;
  document.getElementById('translateAllBtn').disabled = true;
  document.getElementById('translateAllBtn').textContent = '转译中...';

  for (let p = 0; p < allPages.length; p++) {
    currentPage = p;
    await renderPage();
    if (!allPages[p].translated) {
      const ok = await translatePageImage(p);
      if (!ok) {
        isTranslating = false;
        document.getElementById('translateAllBtn').disabled = false;
        document.getElementById('translateAllBtn').textContent = '一键全部转译';
        return;
      }
      await new Promise(r => setTimeout(r, 500));
    }
  }

  isTranslating = false;
  document.getElementById('translateAllBtn').disabled = false;
  document.getElementById('translateAllBtn').textContent = '一键全部转译';
  showToast('全书转译完成！');
}

// ===== Utils =====
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
