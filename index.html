<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白话读书 — AI转译助手</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F6F4F0;
  --bg-card: #FFFFFF;
  --bg-orig: #FAF9F7;
  --bg-trans: #F0F7F4;
  --text-primary: #1A1A1A;
  --text-secondary: #5C5C5C;
  --text-hint: #9A9A9A;
  --accent: #2D7A5F;
  --accent-light: #E8F5EE;
  --accent-hover: #236B50;
  --border: #E8E6E2;
  --border-light: #F0EEEA;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-lg: 20px;
  --font-serif: 'Noto Serif SC', 'Songti SC', serif;
  --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.8;
}

/* Header */
.header {
  padding: 24px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  font-weight: 700;
  font-family: var(--font-serif);
}

.logo-text {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
}

.logo-sub {
  font-size: 12px;
  color: var(--text-hint);
  font-weight: 400;
  margin-left: 12px;
}

.api-config {
  display: flex;
  align-items: center;
  gap: 8px;
}

.api-config input {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  width: 280px;
  font-family: var(--font-sans);
  background: var(--bg);
  transition: border-color 0.2s;
}

.api-config input:focus {
  outline: none;
  border-color: var(--accent);
}

.api-config input::placeholder {
  color: var(--text-hint);
}

/* Upload Area */
.upload-area {
  max-width: 680px;
  margin: 60px auto;
  text-align: center;
  padding: 0 20px;
}

.upload-title {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.upload-desc {
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 36px;
  line-height: 1.8;
}

.upload-box {
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 60px 40px;
  cursor: pointer;
  transition: all 0.3s ease;
  background: var(--bg-card);
}

.upload-box:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}

.upload-box.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: scale(1.01);
}

.upload-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.6;
}

.upload-label {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.upload-hint {
  font-size: 13px;
  color: var(--text-hint);
}

.upload-box input[type="file"] {
  display: none;
}

/* Main Reader */
.reader-container {
  display: none;
  position: fixed;
  top: 73px;
  left: 60px;
  right: 145px;
  bottom: 0;
  flex-direction: column;
  padding: 12px 0 8px;
}

.reader-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  padding: 0 4px;
  flex-shrink: 0;
}

.book-title {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
}

.reader-controls {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-primary);
  font-weight: 500;
}

.btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.btn-primary:hover {
  background: var(--accent-hover);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-pause {
  background: #C0392B;
  border-color: #C0392B;
  color: white;
}

.btn-pause:hover {
  background: #A93226;
  border-color: #A93226;
  color: white;
}

/* Paragraphs */
#paragraphList {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.paragraph-block {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow 0.3s;
  border: 1px solid var(--border-light);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.paragraph-block:hover {
  box-shadow: var(--shadow-md);
}

.paragraph-block.translating {
  border-color: var(--accent);
}

.para-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.para-original {
  padding: 20px 24px;
  background: var(--bg-orig);
  border-right: 1px solid var(--border-light);
  font-family: var(--font-serif);
  font-size: 15px;
  line-height: 2;
  color: var(--text-primary);
  overflow-y: auto;
}

.para-translated {
  padding: 20px 24px;
  background: var(--bg-trans);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 2;
  color: var(--text-primary);
  position: relative;
  overflow-y: auto;
}

.para-label {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 12px;
}

.label-orig {
  background: #F0EEEA;
  color: var(--text-hint);
}

.label-trans {
  background: #D4EDDF;
  color: var(--accent);
}

/* Loading animation */
.loading-dots {
  display: inline-flex;
  gap: 4px;
  align-items: center;
  padding: 8px 0;
}

.loading-dots span {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: dot-bounce 1.2s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes dot-bounce {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

/* Streaming text cursor */
.streaming::after {
  content: '▎';
  color: var(--accent);
  animation: blink 0.8s infinite;
  font-weight: 300;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Page nav */
.page-nav {
  display: none;
}

.side-nav-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 64px;
  background: rgba(255,255,255,0.9);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-md);
  cursor: pointer;
  font-size: 20px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  z-index: 200;
  backdrop-filter: blur(8px);
}

.side-nav-btn:hover {
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: var(--shadow-lg);
}

.side-nav-btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
  pointer-events: none;
}

.side-nav-left { left: 12px; }
.side-nav-right { right: 12px; }

.translate-btns {
  position: fixed;
  right: 12px;
  bottom: calc(50% + 52px);
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 200;
}

.translate-btns .btn {
  width: 120px;
  text-align: center;
  box-shadow: var(--shadow-md);
}

.page-info {
  font-size: 14px;
  color: var(--text-secondary);
  min-width: 120px;
  text-align: center;
}

/* Progress */
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1A1A1A;
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 1000;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
  .api-config input { width: 200px; }
  .upload-area { margin: 30px auto; }
  .upload-title { font-size: 24px; }
  .para-columns { grid-template-columns: 1fr; }
  .para-original { border-right: none; border-bottom: 1px solid var(--border-light); }
  .reader-container { padding: 20px 12px 40px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">白</div>
    <span class="logo-text">白话读书</span>
    <span class="logo-sub">AI转译助手</span>
  </div>
  <div class="api-config">
    <input type="password" id="apiKey" placeholder="输入你的 DeepSeek API Key" />
  </div>
</div>

<!-- Upload -->
<div class="upload-area" id="uploadArea">
  <h1 class="upload-title">把天书变成大白话</h1>
  <p class="upload-desc">
    上传你正在读的PDF，AI会把晦涩的学术语言转译成<br>
    你一看就懂的日常表达，同时保留原文对照学习
  </p>
  <div class="upload-box" id="uploadBox">
    <div class="upload-icon">📄</div>
    <div class="upload-label">点击上传 PDF 或拖拽到这里</div>
    <div class="upload-hint">支持中文/英文 PDF，建议单次上传一本书</div>
    <input type="file" id="fileInput" accept=".pdf" />
  </div>
</div>

<!-- Reader -->
<div class="reader-container" id="readerContainer">
  <div class="reader-header">
    <div class="book-title" id="bookTitle">加载中...</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="paragraphList"></div>
  <div class="page-nav">
    <span class="page-info" id="pageInfo">第 1 页 / 共 1 页</span>
  </div>
</div>

<button class="side-nav-btn side-nav-left" id="prevBtn" onclick="changePage(-1)">‹</button>
<button class="side-nav-btn side-nav-right" id="nextBtn" onclick="changePage(1)">›</button>

<div class="translate-btns" id="translateBtns">
  <button class="btn" onclick="translatePage()">转译当前页</button>
  <button class="btn btn-primary" id="autoBtn" onclick="toggleAutoTranslate()">▶ 自动转译</button>
  <button class="btn" id="translateAllBtn" onclick="translateAll()">一键全部转译</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== State =====
let pdfDoc = null;
let allPages = []; // [{pageNum, imageData, translated}]
let currentPage = 0;
let isTranslating = false;
let currentAbort = null; // 当前翻译的取消控制器
let autoTranslate = false; // 自动转译开关

// ===== PDF.js Setup =====
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// 读取保存的 API Key
const apiKeyInput = document.getElementById('apiKey');
const savedKey = localStorage.getItem('deepseek_api_key');
if (savedKey) apiKeyInput.value = savedKey;
apiKeyInput.addEventListener('input', () => {
  localStorage.setItem('deepseek_api_key', apiKeyInput.value.trim());
});

// ===== Upload Handling =====
const uploadBox = document.getElementById('uploadBox');
const fileInput = document.getElementById('fileInput');

uploadBox.addEventListener('click', () => fileInput.click());
uploadBox.addEventListener('dragover', (e) => { e.preventDefault(); uploadBox.classList.add('dragover'); });
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('dragover'));
uploadBox.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadBox.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') loadPDF(file);
  else showToast('请上传 PDF 文件');
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});

// ===== Load PDF =====
async function loadPDF(file) {
  showToast('正在解析 PDF...');
  const arrayBuffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  const totalPages = pdfDoc.numPages;
  document.getElementById('bookTitle').textContent = file.name.replace('.pdf', '');

  allPages = [];
  for (let i = 1; i <= totalPages; i++) {
    allPages.push({ pageNum: i, imageData: null, translated: '' });
  }

  document.getElementById('uploadArea').style.display = 'none';
  document.getElementById('readerContainer').style.display = 'flex';
  document.getElementById('translateBtns').style.display = 'flex';
  currentPage = 0;
  renderPage();
  showToast(`解析完成，共 ${totalPages} 页`);
}

// ===== Render =====
async function renderPageImage(pageIdx) {
  const p = allPages[pageIdx];
  if (p.imageData) return;
  const pdfPage = await pdfDoc.getPage(p.pageNum);
  const viewport = pdfPage.getViewport({ scale: 1.0 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await pdfPage.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  p.imageData = canvas.toDataURL('image/jpeg', 0.7);
}

async function renderPage() {
  const page = allPages[currentPage];
  if (!page) return;

  const list = document.getElementById('paragraphList');
  list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-hint);">渲染中...</div>';

  document.getElementById('pageInfo').textContent = `第 ${currentPage + 1} 页 / 共 ${allPages.length} 页`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === allPages.length - 1;

  await renderPageImage(currentPage);

  // Pre-render next page in background
  if (currentPage + 1 < allPages.length) renderPageImage(currentPage + 1);

  list.innerHTML = '';
  const block = document.createElement('div');
  block.className = 'paragraph-block';
  block.id = 'para-0';
  block.innerHTML = `
    <div class="para-columns">
      <div class="para-original">
        <div class="para-label label-orig">原文</div>
        <img src="${page.imageData}" style="max-width:100%;border-radius:4px;" />
      </div>
      <div class="para-translated" id="trans-0">
        <div class="para-label label-trans">大白话</div>
        <div id="trans-content-0">
          ${page.translated
            ? formatText(page.translated)
            : '<span style="color:var(--text-hint);font-size:13px;">点击上方"转译当前页"开始</span>'}
        </div>
      </div>
    </div>
  `;
  list.appendChild(block);
  updateProgress();
}

function changePage(delta) {
  const newPage = currentPage + delta;
  if (newPage >= 0 && newPage < allPages.length) {
    currentPage = newPage;
    renderPage();
  }
}

function updateProgress() {
  const done = allPages.filter(p => p.translated).length;
  const pct = allPages.length > 0 ? (done / allPages.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

const SYSTEM_PROMPT = `你是中国顶级的知识通俗化写手，风格融合了万维钢"精英日课"的严谨有趣、最优质知乎长文的亲切感。

你的读者是：受过大学教育、聪明但没有专业背景、时间宝贵、对枯燥文字没有耐心。读完之后他们要感觉"原来如此，这我真懂了"，而不是"嗯……好像明白了？"

【铁律】原文每一步推导都必须保留，一步都不能跳，但要用读者自己的语言重新讲一遍。

【语言规则】
- 句子≤20字，超过立刻拆开
- 全程用"你"和读者说话，有对话感
- 术语第一次出现：先用一句比喻解释它，再用（）标注原词，之后直接用白话
- 数字必须有参照系：不说"增长了300%"，说"相当于原来的4倍"
- 每段只讲一件事，80-120字，段间必须空行，段内不换行
- 并列内容用①②③各自独立成行
- 反常识或重要结论前单独加"注意——"
- 关键词**加粗**
- 话题切换用---

【句式工具箱（自然融入，不要每段都用）】
"说白了就是……"／"问题来了……"／"你可能以为……但实际上……"
"关键就在这里——"／"这就导致了……"／"正因为……，所以……"

【结构】
第一段：最抓人的核心观点，或一个让读者想继续读的反常识点
中间段：按逻辑链逐步展开，每段一个环节，段与段之间要有因果衔接词
最后段：结论是什么 + 这对读者意味着什么

【类比原则】
优先用读者有亲身体验的场景：高考、房价、打工、外卖、健身、谈恋爱
类比只用来解释概念，不超过两句，解释完立刻回到正题

【绝对禁止】
× "简言之""综上所述""由此可见""不难发现""换言之""首先""其次""最后"
× "第一步""第二步""第三步"——用自然的因果衔接词替代，比如"正因为这样……""这就带来了……""接下来问题来了……"
× 逐句对译，保留原文语序
× 学术腔句式，例如"X对Y产生了深远影响"→改成"X让Y彻底变了"
× 被动语态"被认为是"→改成"大家公认"或直接说"研究发现"
× 省略作者的任何论证细节
× 加入原文没有的观点`;

const ANALYZE_PROMPT = `你是资深编辑，专门帮助通俗化写手理解学术文本。分析以下文本，严格按JSON输出，不要任何其他内容：
{"core_point":"作者这一段最想让读者记住的ONE件事（一句话说清楚）","why_matters":"这件事为什么重要，对普通人意味着什么","logical_chain":["第一步推导（要完整，不能跳步）","第二步","..."],"confusing_parts":["中国读者最容易在哪里卡住","..."],"key_concepts":[{"term":"术语","plain":"白话含义","analogy":"建议用什么比喻来解释"}],"conclusion":"最终结论","tone":"原文语气：严肃论证/举例说明/反驳观点/下定义/其他"}`;

// ===== Translation =====
async function translatePageImage(pageIdx, signal, silent = false) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { if (!silent) showToast('请先输入 DeepSeek API Key'); return false; }
  if (/[^\x00-\xFF]/.test(apiKey)) { if (!silent) showToast('API Key 含有非法字符，请重新粘贴'); return false; }

  const page = allPages[pageIdx];
  if (page.translated) return true;

  const block = silent ? null : document.getElementById('para-0');
  const contentEl = silent ? null : document.getElementById('trans-content-0');
  if (block) block.classList.add('translating');

  try {
    if (contentEl) contentEl.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><span style="font-size:12px;color:var(--text-hint);margin-left:8px;">OCR 识别中...</span>';
    await renderPageImage(pageIdx);
    if (signal.aborted) return false;

    const { data: { text } } = await Tesseract.recognize(page.imageData, 'chi_sim+eng');
    if (signal.aborted) return false;

    if (!text.trim()) {
      page.translated = '此页无可识别的文字内容';
      if (contentEl) contentEl.textContent = page.translated;
      updateProgress();
      return true;
    }

    if (contentEl) contentEl.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><span style="font-size:12px;color:var(--text-hint);margin-left:8px;">分析逻辑结构中...</span>';
    let logicStructure = '';
    try {
      const r = await fetch('https://api.deepseek.com/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: ANALYZE_PROMPT }, { role: 'user', content: text }], temperature: 0.3, max_tokens: 1024 }),
        signal
      });
      if (r.ok) logicStructure = (await r.json()).choices?.[0]?.message?.content || '';
    } catch (e) { if (signal.aborted) return false; }

    if (signal.aborted) return false;

    const userPrompt = logicStructure
      ? `编辑已经帮你分析好了这段内容，请严格按分析结果写出大白话版本。\n\n【编辑分析】\n${logicStructure}\n\n【原文】\n${text}\n\n要求：\n1. 按logical_chain的每一步顺序展开，一步都不能省\n2. key_concepts里的每个术语都要用analogy里的比喻来解释\n3. confusing_parts里提到的难点要重点讲清楚\n4. 第一段从core_point切入，最后一段呼应why_matters\n\n直接输出大白话正文，不要重复分析内容：`
      : `请把下面内容转译成大白话：\n\n${text}`;

    if (contentEl) contentEl.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><span style="font-size:12px;color:var(--text-hint);margin-left:8px;">转译中...</span>';

    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: SYSTEM_PROMPT }, { role: 'user', content: userPrompt }], stream: true, temperature: 0.8, max_tokens: 4096 }),
      signal
    });

    if (!response.ok) throw new Error(`API 错误: ${response.status} — ${await response.text()}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let result = '';
    if (contentEl) { contentEl.innerHTML = ''; contentEl.classList.add('streaming'); }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (signal.aborted) { reader.cancel(); return false; }
      for (const line of decoder.decode(value, { stream: true }).split('\n').filter(l => l.startsWith('data: '))) {
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const delta = JSON.parse(data).choices?.[0]?.delta?.content || '';
          result += delta;
          if (contentEl) contentEl.innerHTML = formatText(result);
        } catch (e) {}
      }
    }

    if (contentEl) { contentEl.classList.remove('streaming'); contentEl.innerHTML = formatText(result); }
    page.translated = result;
    updateProgress();
    return true;

  } catch (err) {
    if (err.name === 'AbortError') return false;
    if (contentEl) { contentEl.classList.remove('streaming'); contentEl.innerHTML = `<span style="color:#D85A30;font-size:13px;">转译失败: ${escapeHtml(err.message)}</span>`; }
    return false;
  } finally {
    if (block) block.classList.remove('translating');
  }
}

async function translatePage() {
  // 取消上一次转译
  if (currentAbort) currentAbort.abort();
  currentAbort = new AbortController();
  const signal = currentAbort.signal;

  isTranslating = true;
  try {
    const ok = await translatePageImage(currentPage, signal);
    if (ok && !signal.aborted) showToast('当前页转译完成');
  } finally {
    isTranslating = false;
  }
}

function toggleAutoTranslate() {
  const btn = document.getElementById('autoBtn');
  if (autoTranslate) {
    autoTranslate = false;
    if (currentAbort) currentAbort.abort();
    btn.textContent = '▶ 自动转译';
    btn.classList.remove('btn-pause');
    btn.classList.add('btn-primary');
  } else {
    autoTranslate = true;
    btn.textContent = '⏸ 暂停';
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-pause');
    runAutoTranslate();
  }
}

function setAutoOff() {
  autoTranslate = false;
  const btn = document.getElementById('autoBtn');
  if (btn) { btn.textContent = '▶ 自动转译'; btn.classList.remove('btn-pause'); btn.classList.add('btn-primary'); }
}

async function runAutoTranslate() {
  if (currentAbort) currentAbort.abort();
  currentAbort = new AbortController();
  const signal = currentAbort.signal;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('请先输入 DeepSeek API Key'); setAutoOff(); return; }

  isTranslating = true;
  try {
    for (let p = currentPage; p < allPages.length; p++) {
      if (signal.aborted || !autoTranslate) break;
      if (allPages[p].translated) continue;
      const silent = p !== currentPage;
      if (silent) showToast(`后台转译第 ${allPages[p].pageNum} 页...`);
      const ok = await translatePageImage(p, signal, silent);
      if (!ok) break;
    }
    if (!signal.aborted && autoTranslate) {
      showToast('全部页面转译完成！');
      setAutoOff();
    }
  } finally {
    isTranslating = false;
  }
}

async function translateAll() {
  if (currentAbort) currentAbort.abort();
  currentAbort = new AbortController();
  const signal = currentAbort.signal;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('请先输入 DeepSeek API Key'); return; }

  isTranslating = true;
  const btn = document.getElementById('translateAllBtn');
  btn.disabled = true;
  btn.textContent = '转译中...';

  try {
    for (let p = 0; p < allPages.length; p++) {
      if (signal.aborted) break;
      if (allPages[p].translated) continue;
      currentPage = p;
      await renderPage();
      const ok = await translatePageImage(p, signal);
      if (!ok) break;
      await new Promise(r => setTimeout(r, 300));
    }
    if (!signal.aborted) showToast('全书转译完成！');
  } finally {
    isTranslating = false;
    btn.disabled = false;
    btn.textContent = '一键全部转译';
  }
}

// ===== Utils =====
function formatText(text) {
  return text.split(/\n{2,}/).filter(p => p.trim()).map(p => {
    const content = p.trim().replace(/\n/g, ' ');

    // 分隔线
    if (/^---+$/.test(content)) {
      return `<hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">`;
    }

    const escaped = escapeHtml(content)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')  // **加粗**
      .replace(/\*(.+?)\*/g, '<em>$1</em>');              // *斜体*

    const isPoint = /^[①②③④⑤⑥⑦⑧⑨⑩]|^第[一二三四五六七八九十]/.test(content);
    const isNote = /^(注意|关键在这里|重点|警告)[\s——－-]/.test(content);

    if (isNote) {
      return `<p style="margin:0 0 16px;padding:8px 12px;background:var(--accent-light);border-left:3px solid var(--accent);border-radius:4px;">${escaped}</p>`;
    }
    return `<p style="margin:0 0 ${isPoint ? '8px' : '16px'};${isPoint ? 'padding-left:4px;' : ''}text-indent:${isPoint ? '0' : '2em'};">${escaped}</p>`;
  }).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
